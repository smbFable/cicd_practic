name: First deploy CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-project:
    runs-on: ubuntu-latest

    steps:
      - name: Скачиваем репозиторий
        uses: actions/checkout@v4

      - name: Установка Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Компиляция кода
        run: go build -v ./...

      - name: Авторизация Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Сборка Docker образа
        run: docker build -t my-go-app:latest .

      - name: Пуш
        run: |
          docker tag my-go-app:latest ${{ secrets.DOCKER_USERNAME }}/my-go-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-go-app:latest

